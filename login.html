<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BadutZY Music - Login</title>
    <link rel="icon website" type="img" href="img/BadutZY.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Add Cropper.js CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="img/BadutZY.png" alt="BadutZY Music">
            <h1>BadutZY Music</h1>
        </div>
        
        <div class="tabs">
            <div class="tab active" data-tab="login">Login</div>
            <div class="tab" data-tab="register">Register</div>
        </div>
        
        <!-- Login Form -->
        <div class="form-container active" id="login-form">
            <div class="error-message" id="login-error"></div>
            <div class="success-message" id="login-success"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" required>
                </div>
                
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="password-container">
                        <input type="password" id="loginPassword" required>
                        <span class="password-toggle" onclick="togglePassword('loginPassword', this)">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                </div>
                
                <button type="submit" class="submit-btn">Login</button>
            </form>
            
            <div class="forgot-password">
                <a href="#" id="forgotPasswordLink">Forgot Password?</a>
            </div>
        </div>
        
        <!-- Register Form -->
        <div class="form-container" id="register-form">
            <div class="error-message" id="register-error"></div>
            <div class="success-message" id="register-success"></div>
            
            <form id="registerForm">
                <div class="profile-pic-container">
                    <label for="profilePicInput" class="profile-pic-label">
                        <div class="profile-pic" id="profilePicPreview">
                            <i class="fas fa-user fa-2x" style="color: var(--light-grey);"></i>
                            <div class="profile-pic-overlay">
                                <i class="fas fa-camera" style="color: white;"></i>
                            </div>
                        </div>
                        <span class="profile-pic-text">Upload Profile Picture</span>
                    </label>
                    <input type="file" id="profilePicInput" accept="image/*">
                </div>
                
                <div class="form-group">
                    <label for="registerUsername">Username</label>
                    <input type="text" id="registerUsername" required>
                </div>
                
                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" required>
                </div>
                
                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <div class="password-container">
                        <input type="password" id="registerPassword" required>
                        <span class="password-toggle" onclick="togglePassword('registerPassword', this)">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="password-container">
                        <input type="password" id="confirmPassword" required>
                        <span class="password-toggle" onclick="togglePassword('confirmPassword', this)">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                </div>
                
                <button type="submit" class="submit-btn">Register</button>
            </form>
        </div>
    </div>
    
    <!-- Reset Password Modal -->
    <div class="modal" id="resetPasswordModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Reset Password</h2>
                <button class="close-modal" id="closeResetModal">&times;</button>
            </div>
            
            <div class="error-message" id="reset-error"></div>
            <div class="success-message" id="reset-success"></div>
            
            <!-- Step 1: Username verification -->
            <div id="resetStep1">
                <div class="form-group">
                    <label for="resetUsername">Enter your username</label>
                    <input type="text" id="resetUsername" required>
                </div>
                
                <button id="verifyUsername" class="submit-btn">Verify Username</button>
            </div>
            
            <!-- Step 2: New password input -->
            <div id="resetStep2" style="display: none;">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <div class="password-container">
                        <input type="password" id="newPassword" required>
                        <span class="password-toggle" onclick="togglePassword('newPassword', this)">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirmNewPassword">Confirm New Password</label>
                    <div class="password-container">
                        <input type="password" id="confirmNewPassword" required>
                        <span class="password-toggle" onclick="togglePassword('confirmNewPassword', this)">
                            <i class="fas fa-eye"></i>
                        </span>
                    </div>
                </div>
                
                <button id="updatePassword" class="submit-btn">Update Password</button>
            </div>
        </div>
    </div>
    
    <!-- Crop Image Modal -->
    <div class="modal" id="cropImageModal">
        <div class="modal-content crop-modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Crop Profile Picture</h2>
                <button class="close-modal" id="closeCropModal">&times;</button>
            </div>
            
            <div class="crop-container">
                <img id="cropImage" src="" alt="Image to crop">
            </div>
            
            <div class="crop-controls">
                <button id="cropImageBtn" class="submit-btn">Crop & Save</button>
            </div>
        </div>
    </div>
    
    <!-- Add Cropper.js Script -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
